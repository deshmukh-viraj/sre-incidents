global:
  resolve_timeout: 5m

# Inhibition: suppress lower-severity alerts when a critical is firing
inhibit_rules:
  # If payment gateway is critical, suppress the warning version
  - source_matchers:
      - alertname="PaymentGatewayP99LatencyCritical"
    target_matchers:
      - alertname="PaymentGatewayP99LatencyHigh"
    equal: [service]

  # If DB pool is exhausted, suppress the near-exhaustion warning
  - source_matchers:
      - alertname="DBConnectionPoolExhausted"
    target_matchers:
      - alertname="DBConnectionPoolNearExhaustion"
    equal: [db]

  # If SLO budget is exhausted, suppress the low-budget warning
  - source_matchers:
      - alertname="SLOErrorBudgetExhausted"
    target_matchers:
      - alertname="SLOErrorBudgetLow"
    equal: [service]

# Templates for slack message formatting
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  group_by: ['alertname', 'service']
  group_wait: 5s            # wait 5s before sending first notification
  group_interval: 1m        # wait 1m before sending new alerts for existing group
  repeat_interval: 5m       # re-notify every 1m while still firing
  receiver: 'webhook-default'

  routes:
    # SEV-1: security incidents — immediate, no grouping wait
    - matchers:
        - runbook="RB-003"
      group_wait: 0s
      repeat_interval: 30m
      receiver: 'webhook-security'

    # SEV-1: critical payment/CB alerts
    - matchers:
        - severity="critical"
        - team="payments"
      group_wait: 5s
      repeat_interval: 1m
      receiver: 'webhook-payments-critical'

    # Compliance events — low urgency, batched
    - matchers:
        - team="compliance"
      group_wait: 2m
      group_interval: 10m
      repeat_interval: 24h
      receiver: 'webhook-compliance'

    # Warning-level: standard routing
    - matchers:
        - severity="warning"
      receiver: 'webhook-default'

receivers:
  - name: 'webhook-default'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhook/alert'
        send_resolved: true
        http_config:
          follow_redirects: true
        max_alerts: 10

  - name: 'webhook-payments-critical'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhook/alert'
        send_resolved: true
        #title: '[CRITICAL] Payment Alert'
    # In production, this would also page PagerDuty:
    # pagerduty_configs:
    #   - routing_key: '<PD_KEY>'
    #     description: '{{ .GroupLabels.alertname }}'

  - name: 'webhook-security'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhook/alert'
        send_resolved: true
    # In production: SIEM + SOC on-call + legal escalation

  - name: 'webhook-compliance'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhook/alert'
        send_resolved: false   # compliance events don't auto-resolve

  - name: 'sre-agent-api'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/webhook/alert'
        send_resolved: true