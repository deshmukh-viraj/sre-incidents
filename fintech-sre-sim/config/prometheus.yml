global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "production-sim"
    cluster: "fintech-sim-local"

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "sim-generator"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]