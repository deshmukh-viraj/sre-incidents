server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  #  Ship simulation log files written by log_generator.py 
  - job_name: sim-generator-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: fintech-sim
          environment: production-sim
          __path__: /var/log/sim/*.jsonl

    # Parse structured JSON logs and promote key fields to Loki labels
    pipeline_stages:
      - json:
          expressions:
            level:        level
            service:      service
            trace_id:     trace_id
            span_id:      span_id
            scenario:     __sim_scenario
            injected:     __sim_injected
            http_status:  http_status
            anomaly_type: anomaly_type

      # Promote high-cardinality-safe fields to labels (keep cardinality low!)
      - labels:
          level:
          service:
          scenario:
          injected:

      # Parse timestamp from the log record itself so Loki uses it (not ingest time)
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # ── Ship Docker container logs 
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

    pipeline_stages:
      # Try JSON parse for containers that emit structured logs
      - match:
          selector: '{container=~"sim-generator.*"}'
          stages:
            - json:
                expressions:
                  level:   level
                  service: service
            - labels:
                level:
                service: